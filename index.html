<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>图片浏览</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:system-ui,sans-serif}
#viewer{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
#media-container{flex:1;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;min-height:0}
#media-container img,#media-container video{max-width:100%;max-height:100%;object-fit:contain}
#info{width:100%;padding:8px 12px;background:rgba(0,0,0,.7);color:#fff;font-size:14px;text-align:center;position:absolute;bottom:0;left:0;z-index:10}
#info .name{opacity:.9}
#info .counter{font-size:12px;opacity:.5;margin-top:2px}
#nav{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;z-index:5}
#nav .prev,#nav .next{flex:1;cursor:pointer}
#dir-nav{position:absolute;top:8px;right:8px;z-index:20;display:flex;gap:6px}
#dir-nav select{background:rgba(0,0,0,.6);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:4px;padding:4px 8px;font-size:13px}
</style>
</head>
<body>
<div id="viewer">
  <div id="media-container"></div>
  <div id="info">
    <div class="name" id="filename"></div>
    <div class="counter" id="counter"></div>
  </div>
  <div id="nav">
    <div class="prev"></div>
    <div class="next"></div>
  </div>
  <div id="dir-nav">
    <select id="dir-select"><option value="__all__">全部</option></select>
  </div>
</div>
<script>
let FILES=[];
const VIDEO_EXT=/\.(mp4|webm|mov|avi)$/i;
const MEDIA_EXT=/\.(jpe?g|png|gif|webp|bmp|svg|mp4|webm|mov|avi)$/i;
const container=document.getElementById('media-container');
const filenameEl=document.getElementById('filename');
const counterEl=document.getElementById('counter');
const dirSelect=document.getElementById('dir-select');

let filtered=[];
let idx=0;

// Parse directory listing HTML to extract links
function parseLinks(html,base){
  const links=[];
  const re=/<a\s[^>]*href="([^"]+)"/gi;
  let m;
  while((m=re.exec(html))!==null){
    let href=decodeURIComponent(m[1]);
    if(href.startsWith('/'))continue; // skip absolute
    if(href.startsWith('?')||href.startsWith('#'))continue;
    if(href==='../'||href==='../') continue;
    links.push(href);
  }
  return links;
}

async function fetchDirListing(url){
  const r=await fetch(url);
  if(!r.ok)return[];
  return parseLinks(await r.text(),url);
}

async function scanDir(path){
  const entries=await fetchDirListing(path);
  const files=[];
  const subdirs=[];
  for(const e of entries){
    if(e.endsWith('/'))subdirs.push(e);
    else if(MEDIA_EXT.test(e))files.push(path+e);
  }
  // Recurse into subdirectories
  const subs=await Promise.all(subdirs.map(d=>scanDir(path+d)));
  return files.concat(...subs);
}

// Known year directories to scan (extend as needed)
const KNOWN_DIRS=['2024','2025','2026','2027','2028'];

async function loadFiles(){
  container.innerHTML='<p style="color:#fff;opacity:.6">扫描目录中…</p>';
  try{
    // Try each known directory in parallel; skip those that don't exist
    const results=await Promise.all(KNOWN_DIRS.map(async d=>{
      try{return await scanDir(d+'/')}catch(e){return[]}
    }));
    FILES=results.flat().sort();
  }catch(e){
    container.innerHTML='<p style="color:#fff;padding:20px">无法扫描目录。请确保服务器开启了目录列表（autoindex）。</p>';
    return;
  }
  if(!FILES.length){
    container.innerHTML='<p style="color:#fff;padding:20px">未找到任何图片或视频文件。</p>';
    return;
  }
  // Rebuild directory selector
  const allDirs=[...new Set(FILES.map(f=>f.split('/')[0]))].sort();
  const prev=dirSelect.value;
  dirSelect.innerHTML='<option value="__all__">全部</option>';
  allDirs.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;dirSelect.appendChild(o)});
  if([...dirSelect.options].some(o=>o.value===prev))dirSelect.value=prev;
  applyFilter();
}

function applyFilter(){
  const v=dirSelect.value;
  filtered=v==='__all__'?FILES.slice():FILES.filter(f=>f.startsWith(v+'/'));
  if(idx>=filtered.length)idx=0;
  show();
}
dirSelect.addEventListener('change',applyFilter);

function isVideo(f){return VIDEO_EXT.test(f)}

function show(){
  if(!filtered.length){
    container.innerHTML='<p style="color:#fff">当前目录无文件</p>';
    filenameEl.textContent='';counterEl.textContent='';
    return;
  }
  if(idx<0)idx=filtered.length-1;
  if(idx>=filtered.length)idx=0;
  const f=filtered[idx];
  container.innerHTML='';
  if(isVideo(f)){
    const v=document.createElement('video');
    v.src=encodeURI(f);
    v.controls=true;
    v.autoplay=true;
    v.playsInline=true;
    v.muted=false;
    container.appendChild(v);
  }else{
    const img=document.createElement('img');
    img.src=encodeURI(f);
    img.alt=f;
    container.appendChild(img);
  }
  filenameEl.textContent=f;
  counterEl.textContent=(idx+1)+' / '+filtered.length;
}

// Navigation
document.querySelector('#nav .prev').addEventListener('click',e=>{e.stopPropagation();idx--;show()});
document.querySelector('#nav .next').addEventListener('click',e=>{e.stopPropagation();idx++;show()});

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){idx--;show()}
  else if(e.key==='ArrowRight'||e.key==='ArrowDown'||e.key===' '){idx++;show()}
});

// Swipe support
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX},{passive:true});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].screenX-touchStartX;
  if(Math.abs(dx)>50){dx<0?(idx++,show()):(idx--,show())}
},{passive:true});

loadFiles();
</script>
</body>
</html>
